
version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: affectx-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: affectx-backend
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/affectx-ai
      JWT_SECRET: your_secret_key_here
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: affectx-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  ai-service:
    build: ./ai-service
    container_name: affectx-ai-service
    ports:
      - "5001:5001"
    restart: unless-stopped

volumes:
  mongo-data: